<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="RewardChat">
  <!-- The two halves of the name: a chat bubble (the LINE bot) with a star
       punched out of it (the points).

       The star is painted in the background blue rather than cut with a mask, so
       it survives being rasterised down to 16px where a mask edge turns to mush.
       Flat fills only, no gradients or thin strokes: at favicon size those are
       the first things to disappear.

       #007AFF is the brand primary, the same value the apps' theme token uses.
       (Careful editing this comment: XML forbids a double hyphen inside one, so
       a CSS custom property written in full will silently break the file.) -->
  <rect width="32" height="32" rx="7" fill="#007AFF"/>
  <path
    d="M9 6h14a5 5 0 0 1 5 5v8a5 5 0 0 1-5 5h-7l-7 5v-5a5 5 0 0 1-5-5v-8a5 5 0 0 1 5-5z"
    fill="#FFFFFF"/>
  <path
    d="M16 9.3 17.29 12.72 20.95 12.89 18.09 15.18 19.06 18.71 16 16.7 12.94 18.71 13.91 15.18 11.05 12.89 14.71 12.72Z"
    fill="#007AFF"/>
</svg>
